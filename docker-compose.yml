version: '3.8'

services:
  chat-application:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-application
    ports:
      - "5000:5000"
    environment:
      SPRING_APPLICATION_NAME: chat-application
      SERVER_PORT: "5000"
      SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
      SPRING_DATASOURCE_DRIVERCLASSNAME: org.h2.Driver
      SPRING_H2_CONSOLE_ENABLED: "true"
    volumes:
      - ./src:/app/src
      - chat-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - chat-network
    restart: unless-stopped

  # Optional: H2 Console for development
  h2-console:
    image: oscarfonts/h2
    container_name: h2-console
    ports:
      - "8082:8082"
    environment:
      H2_OPTIONS: -web -webAllowOthers -ifExists
    volumes:
      - h2-data:/h2data
    networks:
      - chat-network
    depends_on:
      - chat-application

volumes:
  chat-logs:
  h2-data:

networks:
  chat-network:
    driver: bridge
